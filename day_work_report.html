<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개발 일지 목록 — DailyBrief</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f4f6fb;--bg2:#ffffff;--surface:#ffffff;--surface2:#f0f3fa;
      --border:#e2e8f4;--primary:#3358f4;--primary2:#5b7fff;
      --accent:#0ec7a5;--warn:#f59e0b;--danger:#ef4444;
      --text:#0f1729;--sub:#4a567a;--muted:#8893b0;
      --mono:'DM Mono',monospace;--sans:'Noto Sans KR',sans-serif;
      --shadow:0 4px 24px rgba(51,88,244,.10);
      --shadow-lg:0 12px 48px rgba(28, 31, 40, 0.14);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden;}
    .container{
      max-width:900px;margin:60px auto 0 auto;padding:40px 24px 60px 24px;
      background:var(--surface);border-radius:18px;box-shadow:var(--shadow-lg);
    }
    h1{
      font-size:2.1rem;font-weight:900;margin-bottom:32px;text-align:center;letter-spacing:-.02em;
    }
    .add-form{
      display:flex;gap:12px;margin-bottom:32px;justify-content:center;align-items:center;
    }
    .add-form input[type="text"]{
      flex:1;min-width:0;padding:12px 14px;font-size:1rem;border:1.5px solid var(--border);
      border-radius:8px;font-family:var(--sans);background:var(--surface2);transition:border-color .15s;
    }
    .add-form input[type="text"]:focus{border-color:var(--primary);outline:none;}
    .add-form button{
      background:var(--primary);color:#fff;border:none;border-radius:8px;padding:12px 28px;
      font-family:var(--sans);font-size:1rem;font-weight:700;cursor:pointer;box-shadow:var(--shadow);
      transition:opacity .15s,transform .15s;
    }
        <tr>
          <th style="width:120px">등록일시
            <button id="sortAscBtn" title="오름차순" class="sort-btn">▲</button>
            <button id="sortDescBtn" title="내림차순" class="sort-btn">▼</button>
          </th>
          <th>작업 내용</th>
          <th style="width:120px">문서 파일</th>
          <th style="width:80px">삭제</th>
            <button id="sortAscBtn" title="오름차순" class="sort-btn">▲</button>
            <button id="sortDescBtn" title="내림차순" class="sort-btn">▼</button>
    <tbody id="workList"></tbody>
    </table>
    <div id="pagingNav" style="margin-top:18px;text-align:center;"></div>
  </div>
  <script>
  let sortOrder = 'desc'; // 기본: 최신순
  let currentPage = 1;
  const PAGE_SIZE = 5;

  function parseDateStr(dateStr) {
    // 'YYYY.MM.DD HH:mm:ss' → Date 객체
    const [datePart, timePart] = dateStr.split(' ');
    const [y, m, d] = datePart.split('.').map(Number);
    let h = 0, mi = 0, s = 0;
    if (timePart) [h, mi, s] = timePart.split(':').map(Number);
    return new Date(y, m - 1, d, h, mi, s);
  }

  function loadList() {
    return JSON.parse(localStorage.getItem('workList') || '[]');
  }
  function saveList(list) {
    localStorage.setItem('workList', JSON.stringify(list));
  }

  function getSortedList() {
    const list = loadList();
    return list.sort((a, b) => {
      const da = parseDateStr(a.date);
      const db = parseDateStr(b.date);
      return sortOrder === 'asc' ? da - db : db - da;
    });
  }

  function setPageTitle() {
    document.getElementById('pageTitle').textContent = '개발 일지 목록';
  }

  function renderList(page) {
    setPageTitle();
    const list = getSortedList();
    const tbody = document.getElementById('workList');
    const pagingNav = document.getElementById('pagingNav');
    tbody.innerHTML = '';
    pagingNav.innerHTML = '';
    if (list.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#b0b8c9;padding:32px 0;">등록된 작업이 없습니다</td></tr>';
      return;
    }
    const total = list.length;
    const totalPages = Math.ceil(total / PAGE_SIZE);
    currentPage = page || currentPage;
    if (currentPage > totalPages) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;
    const startIdx = (currentPage - 1) * PAGE_SIZE;
    const endIdx = Math.min(startIdx + PAGE_SIZE, total);
    for (let i = startIdx; i < endIdx; i++) {
      const item = list[i];
      const tr = document.createElement('tr');
      let fileCell = '';
      if (item.fileName && item.fileUrl) {
        const ext = item.fileName.split('.').pop().toLowerCase();
        const viewable = ['txt', 'html', 'htm', 'md', 'csv', 'json', 'js', 'css'];
        if (viewable.includes(ext)) {
          fileCell = `<a href="#" class="view-file" data-idx="${i}" style="color:var(--primary)">${item.fileName}</a>`;
        } else {
          fileCell = `<a href="${item.fileUrl}" target="_blank" rel="noopener" download="${item.fileName}">${item.fileName}</a>`;
        }
      }
      tr.innerHTML = `
        <td>${item.date}</td>
        <td><a href="#" class="edit-link" data-idx="${i}" style="color:var(--primary);text-decoration:underline;cursor:pointer;">${item.content}</a></td>
        <td>${fileCell}</td>
        <td><button class="delete-btn" data-idx="${i}">삭제</button></td>
      `;
      tbody.appendChild(tr);
    }
    // 페이징 네비게이션
    if (totalPages > 1) {
      let navHtml = '';
      navHtml += `<button class="page-btn" data-page="1" ${currentPage === 1 ? 'disabled' : ''}>&laquo;</button>`;
      navHtml += `<button class="page-btn" data-page="${currentPage - 1}" ${currentPage === 1 ? 'disabled' : ''}>&lt;</button>`;
      for (let p = 1; p <= totalPages; p++) {
        navHtml += `<button class="page-btn" data-page="${p}" ${currentPage === p ? 'style=\'background:var(--primary);color:#fff;font-weight:700\'' : ''}>${p}</button>`;
      }
      navHtml += `<button class="page-btn" data-page="${currentPage + 1}" ${currentPage === totalPages ? 'disabled' : ''}>&gt;</button>`;
      navHtml += `<button class="page-btn" data-page="${totalPages}" ${currentPage === totalPages ? 'disabled' : ''}>&raquo;</button>`;
      pagingNav.innerHTML = navHtml;
    }
  }

  // 정렬 버튼 이벤트 및 스타일
  document.addEventListener('DOMContentLoaded', function () {
    document.getElementById('sortAscBtn').onclick = function (e) {
      sortOrder = 'asc';
      renderList(1);
    };
    document.getElementById('sortDescBtn').onclick = function (e) {
      sortOrder = 'desc';
      renderList(1);
    };
    // 스타일 추가
    const style = document.createElement('style');
    style.textContent = `.sort-btn{border:none;background:none;padding:0 2px;cursor:pointer;vertical-align:middle;color:var(--primary);font-size:1rem;}`;
    document.head.appendChild(style);
  });

  // Add new work
  document.getElementById('addForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const input = document.getElementById('workInput');
    const fileInput = document.getElementById('fileInput');
    const content = input.value.trim();
    if(!content) return;
    const today = new Date();
    const dateStr = today.getFullYear() + '.' + String(today.getMonth()+1).padStart(2,'0') + '.' + String(today.getDate()).padStart(2,'0') + ' ' + String(today.getHours()).padStart(2,'0') + ':' + String(today.getMinutes()).padStart(2,'0') + ':' + String(today.getSeconds()).padStart(2,'0');
    let fileName = '', fileUrl = '';
    if(fileInput.files && fileInput.files[0]) {
      const file = fileInput.files[0];
      fileName = file.name;
      // 파일을 base64로 저장 (로컬 저장소 한계 내에서)
      const reader = new FileReader();
      reader.onload = function(evt) {
        fileUrl = evt.target.result;
        const list = loadList();
        list.unshift({date: dateStr, content, fileName, fileUrl});
        saveList(list);
        input.value = '';
        fileInput.value = '';
        renderList();
      };
      reader.readAsDataURL(file);
      return;
    }
    // 파일 없을 때 바로 저장
    const list = loadList();
    list.unshift({date: dateStr, content, fileName, fileUrl});
    saveList(list);
    input.value = '';
    fileInput.value = '';
    renderList();
  });

  // Delete work & file view & edit
  document.getElementById('workList').addEventListener('click', function(e) {
    if(e.target.classList.contains('delete-btn')) {
      const idx = e.target.getAttribute('data-idx');
      const list = loadList();
      list.splice(idx,1);
      saveList(list);
      renderList();
    }
    // 작업 내용 클릭 시 수정 화면 이동
    if(e.target.classList.contains('edit-link')) {
      const idx = e.target.getAttribute('data-idx');
      window.location.href = `edit_work.html?idx=${idx}`;
    }
    // 텍스트/HTML 파일 보기 (모달)
    if(e.target.classList.contains('view-file')) {
      e.preventDefault();
      const idx = e.target.getAttribute('data-idx');
      const list = loadList();
      const item = list[idx];
      if(item && item.fileUrl && item.fileName) {
        const ext = item.fileName.split('.').pop().toLowerCase();
        fetch(item.fileUrl)
          .then(res => res.text())
          .then(text => {
            const modal = document.getElementById('fileModal');
            const contentDiv = document.getElementById('fileModalContent');
            const titleDiv = document.getElementById('fileModalTitle');
            titleDiv.textContent = item.fileName;
            if(ext === 'html' || ext === 'htm') {
              // HTML은 iframe으로 렌더링
              contentDiv.innerHTML = `<iframe srcdoc="${text.replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}" style="width:100%;height:60vh;border:none;"></iframe>`;
            } else {
              contentDiv.textContent = text;
            }
            modal.style.display = 'flex';
          });
      }
    }
    // 모달 닫기 버튼
    document.getElementById('closeModalBtn').onclick = function() {
      document.getElementById('fileModal').style.display = 'none';
      document.getElementById('fileModalContent').innerHTML = '';
      document.getElementById('fileModalTitle').textContent = '';
    };
    // 모달 바깥 클릭 시 닫기
    document.getElementById('fileModal').onclick = function(e) {
      if(e.target === this) {
        this.style.display = 'none';
        document.getElementById('fileModalContent').innerHTML = '';
        document.getElementById('fileModalTitle').textContent = '';
      }
    };
  });

  // 페이징 버튼 클릭
  document.getElementById('pagingNav').addEventListener('click', function(e) {
    if(e.target.classList.contains('page-btn')) {
      const page = parseInt(e.target.getAttribute('data-page'));
      if(!isNaN(page)) {
        renderList(page);
      }
    }
  });

  // Initial render
  renderList(1);
  </script>

</body>
</html>
