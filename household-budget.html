<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 가계부</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4ff;
  --surface: #ffffff;
  --surface2: #f7f9ff;
  --border: #dde3f5;
  --primary: #3a57e8;
  --primary-light: #eef1ff;
  --primary-dark: #2a46d4;
  --accent: #0aad8e;
  --warn: #f59e0b;
  --danger: #ef4444;
  --text: #0d1b3e;
  --sub: #3d4f7c;
  --muted: #8090b8;
  --red: #e05252;
  --mono: 'DM Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
  --shadow: 0 2px 12px rgba(44,79,212,.08);
  --shadow-lg: 0 6px 32px rgba(44,79,212,.13);
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:linear-gradient(180deg,#167684 0%,#7ed6d3 100%); color:var(--text); font-family:var(--sans); min-height:100vh; }

/* ── HEADER ── */
.app-header {
  background:var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex; align-items:center; justify-content:space-between;
  box-shadow: var(--shadow);
  position: sticky; top:0; z-index:100;
}
.header-left { display:flex; align-items:center; gap:12px; }
.header-icon {
  width:40px; height:40px; border-radius:10px;
  background:linear-gradient(135deg,var(--primary),#7b5fff);
  display:flex; align-items:center; justify-content:center; font-size:1.2rem;
}
.header-title { font-size:1.1rem; font-weight:900; color:var(--text); }
.header-count { font-size:.8rem; color:var(--muted); font-family:var(--mono); }

/* ── SUMMARY CARDS ── */
.summary-section { padding: 20px 32px 0; }
.summary-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr 1fr 1fr;
  gap: 12px;
}
.sum-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  box-shadow: var(--shadow);
}
.sum-card-label { font-size:.72rem; color:var(--muted); margin-bottom:8px; font-weight:500; }
.sum-card-val {
  font-size:1.7rem; font-weight:900; color:var(--text);
  display:flex; align-items:baseline; gap:4px;
}
.sum-unit { font-size:.85rem; font-weight:500; color:var(--sub); }
.sum-card.card-date .sum-card-val { font-size:1.4rem; color:var(--primary); }

/* ── FILTER BAR ── */
.filter-section { padding: 18px 32px 0; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.filter-label { font-size:.8rem; color:var(--muted); font-weight:600; margin-right:4px; }
.filter-btn {
  padding:7px 16px; border-radius:999px;
  border: 1.5px solid var(--border);
  background: var(--surface); color:var(--sub);
  font-family:var(--sans); font-size:.82rem; font-weight:600;
  cursor:pointer; transition:all .15s;
}
.filter-btn:hover { border-color:var(--primary); color:var(--primary); }
.filter-btn.active {
  background:var(--primary); border-color:var(--primary);
  color:#fff; box-shadow:0 2px 10px rgba(58,87,232,.3);
}

/* ── MAIN TABLE AREA ── */
.table-section { padding: 18px 32px 60px; }
.table-wrap {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  box-shadow:var(--shadow);
}

/* ── TABLE HEAD ── */
.t-head {
  background:linear-gradient(135deg, var(--primary), var(--primary-dark));
  display:grid;
  grid-template-columns: 120px 130px 130px 140px 120px 1fr;
  padding: 14px 20px;
}
.th {
  font-size:.82rem; font-weight:700; color:#fff;
  text-align:right;
}
.th:first-child { text-align:left; }
.th.th-detail { text-align:left; padding-left:16px; }

/* ── YEAR GROUP ── */
.year-group { border-bottom: 1px solid var(--border); }
.year-header {
  padding:10px 20px;
  background:var(--surface2);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px;
}
.year-dot { width:8px; height:8px; border-radius:50%; background:var(--red); }
.year-label { font-size:.88rem; font-weight:700; color:var(--text); }

/* ── TABLE ROW ── */
.t-row {
  display:grid;
  grid-template-columns: 120px 130px 130px 140px 120px 1fr;
  padding:0 20px;
  border-bottom:1px solid var(--border);
  align-items:start;
  transition:background .12s;
}
.t-row:last-child { border-bottom:none; }
.t-row:hover { background:var(--surface2); }

.td {
  padding:14px 0;
  font-size:.88rem; color:var(--sub);
  text-align:right;
}
.td:first-child { text-align:left; }
.td.td-month {
  font-size:.95rem; font-weight:700; color:var(--red);
  padding-top:16px;
}
.td.td-amount {
  font-weight:600; color:var(--text);
}
.td.td-dash { color:var(--muted); }
.td.td-detail { text-align:left; padding-left:16px; padding-top:12px; }

/* ── DETAIL TAGS ── */
.detail-toggle {
  display:inline-flex; align-items:center; gap:5px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:6px;
  padding:4px 10px;
  font-size:.72rem; font-weight:600; color:var(--sub);
  cursor:pointer;
  transition:all .15s;
  margin-bottom:8px;
}
.detail-toggle:hover { border-color:var(--primary); color:var(--primary); }
.detail-toggle .arrow { font-size:.65rem; transition:transform .2s; }
.detail-toggle.open .arrow { transform:rotate(180deg); }

.detail-tags {
  display:flex; flex-wrap:wrap; gap:6px;
  margin-top:4px; margin-bottom:10px;
  overflow:hidden;
  max-height:0; transition:max-height .25s ease;
}
.detail-tags.show { max-height:200px; }
.d-tag {
  display:inline-block;
  background:var(--primary-light);
  border:1px solid rgba(58,87,232,.18);
  border-radius:6px;
  padding:3px 10px;
  font-size:.72rem; font-weight:600; color:var(--primary);
  white-space:nowrap;
}
.d-tag.red { background:#fff0f0; border-color:#fca5a5; color:var(--red); }
.d-tag.green { background:#f0fdf4; border-color:#86efac; color:#16a34a; }
.d-tag.yellow { background:#fffbeb; border-color:#fcd34d; color:#d97706; }

/* ── ADD/EDIT MODAL ── */
.modal-overlay {
  position:fixed; inset:0; z-index:300;
  background:rgba(13,27,62,.45); backdrop-filter:blur(6px);
  display:none; align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.open { display:flex; animation:fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  background:var(--surface); border-radius:18px;
  width:100%; max-width:480px;
  box-shadow:0 24px 64px rgba(0,0,0,.18);
  animation:slideUp .25s ease; overflow:hidden;
}
@keyframes slideUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
.modal-header {
  padding:20px 24px 16px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.modal-title { font-size:1rem; font-weight:800; }
.modal-close {
  width:30px; height:30px; border-radius:7px;
  border:1.5px solid var(--border); background:transparent;
  font-size:1rem; cursor:pointer; color:var(--muted);
  display:flex; align-items:center; justify-content:center;
  transition:all .15s;
}
.modal-close:hover { border-color:var(--danger); color:var(--danger); }
.modal-body { padding:20px 24px; }
.form-group { margin-bottom:16px; }
.form-label { font-size:.78rem; font-weight:700; color:var(--sub); display:block; margin-bottom:6px; }
.form-input, .form-select {
  width:100%; padding:10px 14px;
  border:1.5px solid var(--border); border-radius:9px;
  font-family:var(--sans); font-size:.87rem; color:var(--text);
  background:var(--surface2); outline:none;
  transition:border-color .15s;
}
.form-input:focus, .form-select:focus { border-color:var(--primary); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-hint { font-size:.72rem; color:var(--muted); margin-top:5px; }
.detail-input-wrap { display:flex; flex-direction:column; gap:6px; }
.detail-input-row { display:flex; gap:6px; }
.detail-input-row .form-input { flex:1; }
.btn-add-detail {
  padding:9px 14px; border:1.5px dashed var(--border); border-radius:8px;
  background:transparent; color:var(--muted); font-family:var(--sans);
  font-size:.8rem; cursor:pointer; transition:all .15s; text-align:center;
}
.btn-add-detail:hover { border-color:var(--primary); color:var(--primary); }
.btn-del-detail {
  padding:9px 12px; border:1px solid var(--border); border-radius:7px;
  background:transparent; color:var(--muted); cursor:pointer; font-size:.85rem;
  transition:all .15s; flex-shrink:0;
}
.btn-del-detail:hover { border-color:var(--danger); color:var(--danger); }
.modal-footer {
  padding:14px 24px 20px; display:flex; gap:10px;
  border-top:1px solid var(--border);
}
.btn-save {
  flex:1; background:var(--primary); color:#fff; border:none;
  border-radius:10px; padding:12px; font-family:var(--sans);
  font-size:.9rem; font-weight:700; cursor:pointer;
  transition:opacity .15s;
}
.btn-save:hover { opacity:.88; }
.btn-cancel {
  background:transparent; border:1.5px solid var(--border);
  border-radius:10px; padding:12px 20px; font-family:var(--sans);
  font-size:.9rem; font-weight:600; color:var(--sub); cursor:pointer;
  transition:all .15s;
}
.btn-cancel:hover { border-color:var(--primary); color:var(--primary); }

/* ── FAB ── */
.fab {
  position:fixed; bottom:28px; right:28px;
  width:52px; height:52px; border-radius:50%;
  background:var(--primary); color:#fff; border:none;
  font-size:1.4rem; cursor:pointer;
  box-shadow:0 4px 20px rgba(58,87,232,.4);
  display:flex; align-items:center; justify-content:center;
  transition:transform .15s, box-shadow .15s;
  z-index:200;
}
.fab:hover { transform:scale(1.08); box-shadow:0 6px 28px rgba(58,87,232,.5); }

/* ── ROW ACTION BUTTONS ── */
.t-row { position:relative; }
.row-actions {
  display:none;
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  gap:6px; align-items:center;
  z-index:10;
}
.t-row:hover .row-actions { display:flex; }
.btn-row {
  width:30px; height:30px; border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  font-size:.85rem; cursor:pointer; border:1.5px solid;
  transition:all .15s; background:var(--surface);
}
.btn-row-edit { border-color:var(--border); color:var(--primary); }
.btn-row-edit:hover { background:var(--primary-light); border-color:var(--primary); }
.btn-row-del { border-color:var(--border); color:var(--danger); }
.btn-row-del:hover { background:#fff0f0; border-color:var(--danger); }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px);
  background:#1e293b; color:#fff;
  padding:10px 20px; border-radius:10px; font-size:.83rem;
  opacity:0; transition:all .3s; pointer-events:none; z-index:999;
  white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── CONFIRM MODAL ── */
.confirm-modal {
  background:var(--surface); border-radius:16px;
  width:100%; max-width:360px;
  box-shadow:0 24px 64px rgba(0,0,0,.18);
  animation:slideUp .22s ease; overflow:hidden;
  padding:28px 28px 22px;
  text-align:center;
}
.confirm-icon { font-size:2rem; margin-bottom:10px; }
.confirm-title { font-size:1rem; font-weight:800; margin-bottom:8px; }
.confirm-desc { font-size:.85rem; color:var(--sub); line-height:1.7; margin-bottom:22px; }
.confirm-btns { display:flex; gap:10px; }
.btn-confirm-del {
  flex:1; background:var(--danger); color:#fff; border:none;
  border-radius:9px; padding:11px; font-family:var(--sans);
  font-size:.88rem; font-weight:700; cursor:pointer; transition:opacity .15s;
}
.btn-confirm-del:hover { opacity:.88; }
.btn-confirm-cancel {
  flex:1; background:transparent; border:1.5px solid var(--border);
  border-radius:9px; padding:10px; font-family:var(--sans);
  font-size:.88rem; font-weight:600; color:var(--sub); cursor:pointer;
  transition:all .15s;
}
.btn-confirm-cancel:hover { border-color:var(--primary); color:var(--primary); }

/* ── HEADER ADD BTN ── */
.btn-header-add {
  display:flex; align-items:center; gap:6px;
  background:var(--primary); color:#fff; border:none;
  border-radius:9px; padding:8px 18px;
  font-family:var(--sans); font-size:.82rem; font-weight:700;
  cursor:pointer; box-shadow:0 2px 10px rgba(58,87,232,.28);
  transition:opacity .15s, transform .1s;
}
.btn-header-add:hover { opacity:.88; transform:translateY(-1px); }

/* ── EMPTY ── */
.empty-row {
  padding:48px 20px; text-align:center; color:var(--muted);
  font-size:.88rem;
}

@media(max-width:900px) {
  .summary-grid { grid-template-columns:1fr 1fr; }
  .sum-card.card-date { grid-column:1/-1; }
  .app-header,.summary-section,.filter-section,.table-section { padding-left:16px; padding-right:16px; }
  .t-head,.t-row { grid-template-columns:80px 100px 100px 110px 90px 1fr; font-size:.78rem; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <div class="header-left">
    <div class="header-icon">🪙</div>
    <div class="header-title">나의 가계부</div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <div class="header-count" id="totalCount">총 0건</div>
    <button class="btn-header-add" onclick="openAddModal()">＋ 새 항목</button>
  </div>
</div>

<!-- SUMMARY CARDS -->
<div class="summary-section">
  <div class="summary-grid">
    <div class="sum-card card-date">
      <div class="sum-card-label">최근 월</div>
      <div class="sum-card-val" id="sumDate">—</div>
    </div>
    <div class="sum-card">
      <div class="sum-card-label">카뱅</div>
      <div class="sum-card-val"><span id="sumKb">0</span><span class="sum-unit">만원</span></div>
    </div>
    <div class="sum-card">
      <div class="sum-card-label">국민</div>
      <div class="sum-card-val"><span id="sumKbm">0</span><span class="sum-unit">만원</span></div>
    </div>
    <div class="sum-card">
      <div class="sum-card-label">정기예금</div>
      <div class="sum-card-val"><span id="sumDeposit">0</span><span class="sum-unit">만원</span></div>
    </div>
    <div class="sum-card">
      <div class="sum-card-label">적금</div>
      <div class="sum-card-val"><span id="sumSaving">0</span><span class="sum-unit">만원</span></div>
    </div>
  </div>
</div>

<!-- FILTER -->
<div class="filter-section" id="filterSection">
  <span class="filter-label">연도 필터</span>
</div>

<!-- TABLE -->
<div class="table-section">
  <div class="table-wrap">
    <div class="t-head">
      <div class="th">년 / 월</div>
      <div class="th">카뱅</div>
      <div class="th">국민</div>
      <div class="th">정기예금</div>
      <div class="th">적금</div>
      <div class="th th-detail">세부내역</div>
    </div>
    <div id="tableBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirmOverlay" onclick="closeConfirmOutside(event)">
  <div class="confirm-modal">
    <div class="confirm-icon">🗑</div>
    <div class="confirm-title">항목을 삭제하시겠어요?</div>
    <div class="confirm-desc" id="confirmDesc">이 작업은 되돌릴 수 없습니다.</div>
    <div class="confirm-btns">
      <button class="btn-confirm-del" onclick="confirmDelete()">삭제하기</button>
      <button class="btn-confirm-cancel" onclick="closeConfirm()">취소</button>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="openAddModal()" title="새 항목 추가">＋</button>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">항목 추가</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">연도</label>
          <select class="form-select" id="fYear">
            <option>2026</option><option>2025</option><option>2024</option>
            <option>2023</option><option>2022</option><option>2021</option>
            <option>2020</option><option>2019</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">월</label>
          <select class="form-select" id="fMonth">
            <option>1</option><option>2</option><option>3</option><option>4</option>
            <option>5</option><option>6</option><option>7</option><option>8</option>
            <option>9</option><option>10</option><option>11</option><option>12</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">카뱅 (만원)</label>
          <input class="form-input" type="number" id="fKb" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">국민 (만원)</label>
          <input class="form-input" type="number" id="fKbm" placeholder="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">정기예금 (만원)</label>
          <input class="form-input" type="number" id="fDeposit" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">적금 (만원)</label>
          <input class="form-input" type="number" id="fSaving" placeholder="0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">세부내역</label>
        <div class="detail-input-wrap" id="detailInputs">
          <div class="detail-input-row">
            <input class="form-input" type="text" placeholder="예: 카뱅 서브 50만">
            <button class="btn-del-detail" onclick="removeDetail(this)">−</button>
          </div>
        </div>
        <button class="btn-add-detail" onclick="addDetailInput()" style="margin-top:8px;">+ 세부내역 추가</button>
        <div class="form-hint">// 각 항목을 별도 태그로 표시합니다</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-save" onclick="saveEntry()">저장하기</button>
      <button class="btn-cancel" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
// 데이터 (스크린샷 기반 초기 데이터)
// ════════════════════════════════════════
let DATA = [
  // 2026
  { id:1, year:2026, month:3, kb:5, kbm:480, deposit:0, saving:160, details:[] },
  // 2022
  { id:2, year:2022, month:12, kb:5, kbm:900, deposit:1000, saving:null, details:['핀트 20만·미에 100만','일본투어 165만'] },
  { id:3, year:2022, month:11, kb:10, kbm:930, deposit:1000, saving:null, details:['핀트 20만·미래셋 100만','스키 지출 300만'] },
  { id:4, year:2022, month:10, kb:1500, kbm:600, deposit:null, saving:null, details:['카뱅 서브 50만','핀트 20만','데크 지붕 공사 지출 100만','돔 구입 외 200만'] },
  { id:5, year:2022, month:9, kb:1500, kbm:500, deposit:null, saving:null, details:['내역 3건'] },
  { id:6, year:2022, month:8, kb:1500, kbm:450, deposit:null, saving:null, details:['내역 3건'] },
  { id:7, year:2022, month:7, kb:1500, kbm:450, deposit:null, saving:null, details:['내역 3건'] },
  { id:8, year:2022, month:6, kb:1500, kbm:500, deposit:null, saving:null, details:['내역 4건'] },
];
let editId = null;
let currentFilter = 'all';

// ── 저장/불러오기 ──────────────────────
function saveData() {
  try { localStorage.setItem('hb_data', JSON.stringify(DATA)); } catch(e){}
}
function loadData() {
  try {
    const saved = localStorage.getItem('hb_data');
    if(saved) DATA = JSON.parse(saved);
  } catch(e){}
}

// ── 렌더링 ────────────────────────────
function render() {
  updateSummary();
  renderFilters();
  renderTable();
  document.getElementById('totalCount').textContent = `총 ${DATA.length}건`;
}

function updateSummary() {
  if(DATA.length === 0) return;
  const sorted = [...DATA].sort((a,b)=> b.year*100+b.month - (a.year*100+a.month));
  const latest = sorted[0];
  document.getElementById('sumDate').textContent = `${latest.year}/${latest.month}`;
  document.getElementById('sumKb').textContent = latest.kb ?? '—';
  document.getElementById('sumKbm').textContent = latest.kbm ?? '—';
  document.getElementById('sumDeposit').textContent = latest.deposit != null ? latest.deposit : '—';
  document.getElementById('sumSaving').textContent = latest.saving != null ? latest.saving : '—';
}

function renderFilters() {
  const years = [...new Set(DATA.map(d=>d.year))].sort((a,b)=>b-a);
  const sec = document.getElementById('filterSection');
  sec.innerHTML = `<span class="filter-label">연도 필터</span>`;
  // 전체
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn' + (currentFilter==='all'?' active':'');
  allBtn.textContent = '전체';
  allBtn.onclick = ()=>{ currentFilter='all'; render(); };
  sec.appendChild(allBtn);
  years.forEach(y=>{
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (currentFilter==y?' active':'');
    btn.textContent = String(y);
    btn.onclick = ()=>{ currentFilter=y; render(); };
    sec.appendChild(btn);
  });
}

function renderTable() {
  const body = document.getElementById('tableBody');
  body.innerHTML = '';
  const filtered = currentFilter==='all'
    ? [...DATA]
    : DATA.filter(d=>d.year==currentFilter);
  if(filtered.length===0){
    body.innerHTML = '<div class="empty-row">📭 표시할 데이터가 없습니다. + 버튼으로 추가하세요.</div>';
    return;
  }
  filtered.sort((a,b)=> b.year*100+b.month - (a.year*100+a.month));
  // 연도 그룹핑
  const byYear = {};
  filtered.forEach(d=>{
    if(!byYear[d.year]) byYear[d.year]=[];
    byYear[d.year].push(d);
  });
  Object.keys(byYear).sort((a,b)=>b-a).forEach(year=>{
    const grp = document.createElement('div');
    grp.className = 'year-group';
    grp.innerHTML = `<div class="year-header"><span class="year-dot"></span><span class="year-label">${year}년</span></div>`;
    byYear[year].forEach(row=>{
      const r = document.createElement('div');
      r.className = 't-row';
      const detailsHtml = buildDetailHtml(row);
      r.innerHTML = `
        <div class="td td-month">${row.month}월</div>
        <div class="td td-amount">${row.kb!=null?row.kb+'만':'—'}</div>
        <div class="td td-amount">${row.kbm!=null?row.kbm+'만':'—'}</div>
        <div class="td td-amount">${row.deposit!=null?row.deposit+'만':'—'}</div>
        <div class="td td-amount">${row.saving!=null?row.saving+'만':'—'}</div>
        <div class="td td-detail">${detailsHtml}</div>
        <div class="row-actions">
          <button class="btn-row btn-row-edit" title="편집" onclick="openEditModal(${row.id})">✏️</button>
          <button class="btn-row btn-row-del" title="삭제" onclick="openConfirm(${row.id})">🗑</button>
        </div>`;
      grp.appendChild(r);
    });
    body.appendChild(grp);
  });
}

function buildDetailHtml(row) {
  if(!row.details || row.details.length===0) return '<span style="color:var(--muted);font-size:.8rem;">—</span>';
  const uid = `detail-${row.id}`;
  const tags = row.details.map(d=>`<span class="d-tag">${d}</span>`).join('');
  return `
    <div class="detail-toggle" id="toggle-${uid}" onclick="toggleDetail('${uid}')">
      <span>내역 ${row.details.length}건</span>
      <span class="arrow">▼</span>
    </div>
    <div class="detail-tags" id="${uid}">${tags}</div>`;
}

function toggleDetail(uid) {
  const tags = document.getElementById(uid);
  const toggle = document.getElementById(`toggle-${uid}`);
  tags.classList.toggle('show');
  toggle.classList.toggle('open');
}

// ── 모달 ─────────────────────────────
function openAddModal() {
  editId = null;
  document.getElementById('modalTitle').textContent = '항목 추가';
  document.getElementById('fYear').value = new Date().getFullYear();
  document.getElementById('fMonth').value = new Date().getMonth()+1;
  document.getElementById('fKb').value = '';
  document.getElementById('fKbm').value = '';
  document.getElementById('fDeposit').value = '';
  document.getElementById('fSaving').value = '';
  document.getElementById('detailInputs').innerHTML = `
    <div class="detail-input-row">
      <input class="form-input" type="text" placeholder="예: 카뱅 서브 50만">
      <button class="btn-del-detail" onclick="removeDetail(this)">−</button>
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function openEditModal(id) {
  const row = DATA.find(d=>d.id===id);
  if(!row) return;
  editId = id;
  document.getElementById('modalTitle').textContent = `${row.year}년 ${row.month}월 편집`;
  document.getElementById('fYear').value = row.year;
  document.getElementById('fMonth').value = row.month;
  document.getElementById('fKb').value = row.kb ?? '';
  document.getElementById('fKbm').value = row.kbm ?? '';
  document.getElementById('fDeposit').value = row.deposit ?? '';
  document.getElementById('fSaving').value = row.saving ?? '';
  // 세부내역
  const di = document.getElementById('detailInputs');
  di.innerHTML = '';
  (row.details||[]).forEach(d=>{
    di.innerHTML += `<div class="detail-input-row">
      <input class="form-input" type="text" value="${d}" placeholder="예: 카뱅 서브 50만">
      <button class="btn-del-detail" onclick="removeDetail(this)">−</button>
    </div>`;
  });
  if(di.children.length===0) {
    di.innerHTML = `<div class="detail-input-row">
      <input class="form-input" type="text" placeholder="예: 카뱅 서브 50만">
      <button class="btn-del-detail" onclick="removeDetail(this)">−</button>
    </div>`;
  }
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function addDetailInput() {
  const di = document.getElementById('detailInputs');
  const row = document.createElement('div');
  row.className = 'detail-input-row';
  row.innerHTML = `<input class="form-input" type="text" placeholder="예: 핀트 20만">
    <button class="btn-del-detail" onclick="removeDetail(this)">−</button>`;
  di.appendChild(row);
}
function removeDetail(btn) {
  const row = btn.closest('.detail-input-row');
  if(row) row.remove();
}

function saveEntry() {
  const year = parseInt(document.getElementById('fYear').value);
  const month = parseInt(document.getElementById('fMonth').value);
  const kb = document.getElementById('fKb').value !== '' ? parseFloat(document.getElementById('fKb').value) : null;
  const kbm = document.getElementById('fKbm').value !== '' ? parseFloat(document.getElementById('fKbm').value) : null;
  const deposit = document.getElementById('fDeposit').value !== '' ? parseFloat(document.getElementById('fDeposit').value) : null;
  const saving = document.getElementById('fSaving').value !== '' ? parseFloat(document.getElementById('fSaving').value) : null;
  const details = [...document.querySelectorAll('#detailInputs .form-input')]
    .map(i=>i.value.trim()).filter(v=>v);

  const wasEdit = editId !== null;
  if(wasEdit) {
    const idx = DATA.findIndex(d=>d.id===editId);
    DATA[idx] = { id:editId, year, month, kb, kbm, deposit, saving, details };
  } else {
    const newId = DATA.length ? Math.max(...DATA.map(d=>d.id))+1 : 1;
    DATA.push({ id:newId, year, month, kb, kbm, deposit, saving, details });
  }
  saveData();
  closeModal();
  render();
  showToast(wasEdit ? '✅ 항목이 수정되었습니다.' : '✅ 새 항목이 등록되었습니다.');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
}
function closeModalOutside(e) {
  if(e.target===document.getElementById('modalOverlay')) closeModal();
}

// ── 삭제 확인 ────────────────────────
let deleteTargetId = null;
function openConfirm(id) {
  const row = DATA.find(d=>d.id===id);
  if(!row) return;
  deleteTargetId = id;
  document.getElementById('confirmDesc').textContent =
    `${row.year}년 ${row.month}월 항목을 삭제합니다. 이 작업은 되돌릴 수 없습니다.`;
  document.getElementById('confirmOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function confirmDelete() {
  if(deleteTargetId===null) return;
  DATA = DATA.filter(d=>d.id!==deleteTargetId);
  saveData();
  closeConfirm();
  render();
  showToast('🗑 항목이 삭제되었습니다.');
}
function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
  document.body.style.overflow='';
  deleteTargetId = null;
}
function closeConfirmOutside(e) {
  if(e.target===document.getElementById('confirmOverlay')) closeConfirm();
}

// ── 토스트 ────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
}

// ── 초기화 ───────────────────────────
loadData();
render();
</script>
</body>
</html>
